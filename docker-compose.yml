version: '3.9'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: studentapp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: studentapp
      MYSQL_USER: studentuser
      MYSQL_PASSWORD: studentpass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - studentapp-network

  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studentapp-api
    environment:
      DB_URL: jdbc:mysql://mysql:3306/studentapp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: studentuser
      DB_PASSWORD: studentpass123
      JWT_SECRET: ${JWT_SECRET:-01234567890123456789012345678901}
      ENFORCE_HTTPS: "false"
      CORS_ALLOWED_ORIGIN: "http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - studentapp-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/actuator/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Adminer for Database Management (optional)
  adminer:
    image: adminer
    container_name: studentapp-adminer
    ports:
      - "8081:8080"
    depends_on:
      - mysql
    networks:
      - studentapp-network

networks:
  studentapp-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
