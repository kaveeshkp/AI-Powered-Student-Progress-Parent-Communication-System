spring.application.name=studentapp

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/studentapp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=8080

# ============================================================================
# SECURITY: JWT & Authentication Configuration
# ============================================================================
# WARNING: The default JWT_SECRET is NOT suitable for production!
# 
# In production, you MUST:
# 1. Generate a strong random secret (32+ bytes, base64 encoded)
#    Example: openssl rand -base64 32
# 2. Set environment variable: export JWT_SECRET="your-generated-secret"
# 3. Never commit the real secret to version control
# 4. Rotate the secret periodically
#
# Current setting uses default fallback only for development!
app.jwt.secret=${JWT_SECRET:01234567890123456789012345678901}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ============================================================================
# SECURITY: Rate Limiting (Brute Force Protection)
# ============================================================================
# Auth endpoints: 5 requests per minute per IP (prevents brute force)
# Login failures: 3 attempts per minute per IP (additional protection)
# Rate limiting is always active on /api/v1/auth/** endpoints
#
# No configuration needed - uses Bucket4j internally
# Returns 429 (Too Many Requests) when limit is exceeded

# ============================================================================
# SECURITY: HTTPS/TLS Enforcement
# ============================================================================
# For DEVELOPMENT (http://localhost):
#   - HTTPS enforcement is disabled (default)
#   - Secure cookies are not required
#
# For PRODUCTION (only change these when deployed with HTTPS):
#   - Set ENFORCE_HTTPS=true to enable HTTPS-only mode
#   - Set REQUIRE_SECURE_COOKIES=true for secure cookies only
#   - Set ENABLE_HSTS=true for Strict-Transport-Security header
#
# Example production settings:
#   export ENFORCE_HTTPS=true
#   export REQUIRE_SECURE_COOKIES=true
#   export ENABLE_HSTS=true
#
app.security.enforce-https=${ENFORCE_HTTPS:false}
app.security.require-secure-cookies=${REQUIRE_SECURE_COOKIES:false}
app.security.enable-hsts=${ENABLE_HSTS:false}
app.security.hsts-max-age=${HSTS_MAX_AGE:31536000}
app.security.hsts-include-subdomains=${HSTS_INCLUDE_SUBDOMAINS:false}
app.security.hsts-preload=${HSTS_PRELOAD:false}
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173,http://localhost:5174,http://localhost:5175}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.studentapp=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
logging.file.path=${LOG_PATH:logs}
logging.file.name=${LOG_PATH:logs}/application.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
